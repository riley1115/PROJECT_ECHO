<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryhlle</title>
</head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Segoe UI", sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; }

  
  nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2rem; border-bottom: 1px solid #222; }
  nav .logo { font-size: 1rem; font-weight: 600; color: #fff; letter-spacing: 0.05em; }
  nav .links { display: flex; gap: 1.5rem; }
  nav .links a { color: #aaa; text-decoration: none; font-size: 0.88rem; }
  nav .links a:hover { color: #fff; }
    
  .hero { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 4rem 2rem 3rem; gap: 1.2rem; }
  .photo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; object-position: center 10%; border: 3px solid #333; }
  .hero h1 { font-size: 2rem; font-weight: 700; color: #fff; line-height: 1.2; }
  .tag { background: #1e1e1e; border: 1px solid #333; color: #aaa; font-size: 0.8rem; padding: 0.3rem 1rem; border-radius: 100px; letter-spacing: 0.05em; }
  .hero p { color: #888; max-width: 400px; font-size: 0.93rem; line-height: 1.7; }
  .hero-btns { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; margin-top: 0.4rem; }
    

  .btn { padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 0.88rem; text-decoration: none; border: none; cursor: pointer; }
  .btn-white { background: #fff; color: #111; font-weight: 600; }
  .btn-dark { background: #1e1e1e; color: #ccc; border: 1px solid #333; }
  .btn:hover { opacity: 0.8; }


  .section { max-width: 680px; margin: 0 auto; padding: 2.5rem 2rem; border-top: 1px solid #1e1e1e; }
  .section h2 { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: #555; margin-bottom: 1.2rem; }
  .skills { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .skill { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc; font-size: 0.83rem; padding: 0.4rem 1rem; border-radius: 6px; }
   
   .project { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 1.2rem 1.4rem; margin-bottom: 0.8rem; }
  .project-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
  .project h3 { font-size: 0.95rem; color: #eee; font-weight: 600; }
  .badge { font-size: 0.72rem; color: #666; background: #1e1e1e; border: 1px solid #2a2a2a; padding: 2px 8px; border-radius: 100px; }
  .project p { font-size: 0.85rem; color: #666; line-height: 1.6; }
  .contact-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .contact-link { background: #141414; border: 1px solid #222; color: #bbb; font-size: 0.85rem; padding: 0.5rem 1.2rem; border-radius: 8px; text-decoration: none; }
  .contact-link:hover { border-color: #444; color: #fff; }
  footer { text-align: center; padding: 2rem; font-size: 0.78rem; color: #333; border-top: 1px solid #1a1a1a; margin-top: 2rem; }
   </style>

<body>
    
</body>
</html>
